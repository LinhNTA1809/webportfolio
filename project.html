<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="project-page">
    <div class="container">
        <div class="navbar">
            <ul class="menu">
                <li><a href="index.html">MENU</a></li>
                <li><a href="project.html">PROJECT</a></li>
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>

	<div class="project-slider">

    	<div class="arrow left" onclick="prevSlide()">&#10094;</div>

    	<div class="slides">
            <img src="project1.png" class="slide">
            <img src="project2.png" class="slide">
            <img src="project3.png" class="slide">
    	</div>

    	<div class="arrow right" onclick="nextSlide()">&#10095;</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    let currentSlide = 1;
    const slides = document.querySelectorAll(".slide");

    function updateSlides() {
        slides.forEach((slide, i) => {
            slide.classList.remove("active", "left", "right");

            if(i === currentSlide) {
                slide.classList.add("active");
            } else if(i === (currentSlide - 1 + slides.length) % slides.length) {
                slide.classList.add("left");
            } else if(i === (currentSlide + 1) % slides.length) {
                slide.classList.add("right");
            }
        });
    }

    function nextSlide() {
        currentSlide = (currentSlide + 1) % slides.length;
        updateSlides();
    }

    function prevSlide() {
        currentSlide = (currentSlide - 1 + slides.length) % slides.length;
        updateSlides();
    }

    window.nextSlide = nextSlide;
    window.prevSlide = prevSlide;

    updateSlides();

    slides.forEach((slide) => {
      slide.addEventListener("click", () => {
        const imgSrc = slide.getAttribute("src");

        const comicSrc = imgSrc.replace("project", "comic");

        window.location.href = `comics.html?img=${comicSrc}`;
      });
    });

});
</script>
</body>
</html>
